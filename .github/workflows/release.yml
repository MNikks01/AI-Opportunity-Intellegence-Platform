# Release — on merge to main, open/update a "Version Packages" PR from pending changesets.
# Packages are private, so no npm publish; this applies version bumps + per-package changelogs.
#
# CI on the release PR: GitHub does NOT run workflows on PRs/commits authored by the default
# GITHUB_TOKEN (anti-recursion), so a release PR opened with it is gated as `action_required` and can't
# satisfy branch protection. To fix this, set a `RELEASE_TOKEN` secret (a fine-grained PAT with
# contents:write + pull-requests:write) — the release PR is then authored by that identity and CI runs
# automatically. Falls back to GITHUB_TOKEN when the secret is absent (release PR still opens; its checks
# just need a manual re-trigger, e.g. close/reopen the PR).
name: Release

on:
  push:
    branches: [main]

concurrency:
  group: "release-${{ github.ref }}"
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Version Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v6
        with:
          version: "9.12.0"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Create Version Packages PR
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          # PAT (RELEASE_TOKEN) when available so the release PR triggers CI; GITHUB_TOKEN otherwise.
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
