# Release — on merge to main, open/update a "Version Packages" PR from pending changesets.
# Packages are private, so no npm publish; this applies version bumps + per-package changelogs.
name: Release

on:
  push:
    branches: [main]

concurrency:
  group: "release-${{ github.ref }}"
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Version Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          version: "9.12.0"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Create Version Packages PR
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
