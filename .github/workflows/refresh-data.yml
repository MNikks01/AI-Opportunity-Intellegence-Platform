# Live data for the public demo: run the ingestion → cluster → score pipeline against the deployed
# database on a schedule (every 3h), so new trends keep appearing. Free (GitHub-hosted runner). The
# three keyless sources (HN/GitHub/Hugging Face) always ingest; the rest activate when their key is set.
#
# Setup (repo → Settings → Secrets and variables → Actions → New repository secret):
#   DEMO_DATABASE_URL     = Neon connection string (DIRECT host, no -pooler, no channel_binding), e.g.
#                           postgresql://user:pw@ep-xxx.c-2…neon.tech/neondb?sslmode=require&connect_timeout=30
#   OPENAI_API_KEY        = (optional) real embeddings + scoring, direct (no gateway). Else Stub scores.
#   Optional source keys (widen ingestion): INGEST_GITHUB_TOKEN, HUGGINGFACE_TOKEN, YOUTUBE_API_KEY,
#   REDDIT_CLIENT_ID, REDDIT_CLIENT_SECRET, PRODUCTHUNT_TOKEN. (GITHUB_TOKEN is reserved by Actions, so
#   the GitHub source key is passed as INGEST_GITHUB_TOKEN.)
name: refresh-demo-data

on:
  schedule:
    - cron: "0 */3 * * *" # every 3 hours
  workflow_dispatch: {} # manual "Run workflow" button

concurrency:
  group: refresh-demo-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Ingest → cluster → score
        env:
          DATABASE_URL: ${{ secrets.DEMO_DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Optional source keys — set as repo secrets to widen ingestion beyond the 3 keyless sources.
          GITHUB_TOKEN: ${{ secrets.INGEST_GITHUB_TOKEN }}
          HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          PRODUCTHUNT_TOKEN: ${{ secrets.PRODUCTHUNT_TOKEN }}
          # Optional digest delivery — set a webhook secret to post the daily brief to Slack/Discord.
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::warning::DEMO_DATABASE_URL secret is not set — add it to enable the live refresh. Skipping."
            exit 0
          fi
          if [ -n "$OPENAI_API_KEY" ]; then
            # point the AI SDK straight at OpenAI (no gateway) — real embeddings + scoring
            export LITELLM_BASE_URL="https://api.openai.com/v1"
            export AIOI_LLM_API_KEY="$OPENAI_API_KEY"
            echo "Scoring with real OpenAI models."
          else
            echo "Scoring with the Stub — add an OPENAI_API_KEY secret for real scores."
          fi
          pnpm --filter @aioi/database exec prisma migrate deploy
          pnpm exec tsx scripts/demo-data.ts
