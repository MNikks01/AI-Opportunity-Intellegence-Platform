# Live data for the public demo: run the ingestion → cluster → score pipeline against the deployed
# database on a schedule, so new trends keep appearing. Free (GitHub-hosted runner). Ingestion of the
# three keyless sources (HN/GitHub/Hugging Face) is always real; scoring uses the Stub unless a real
# AI endpoint is configured (see the optional secrets below).
#
# Setup (one time): repo → Settings → Secrets and variables → Actions → New repository secret
#   DEMO_DATABASE_URL = your Neon connection string (DIRECT host, no -pooler, no channel_binding), e.g.
#                       postgresql://user:pw@ep-xxx.c-2.us-east-1.aws.neon.tech/neondb?sslmode=require&connect_timeout=30
#   OPENAI_API_KEY    = (optional) your OpenAI key → real embeddings + scoring (direct, no gateway).
#                       Without it, ingestion is still real but scoring uses the deterministic Stub.
name: refresh-demo-data

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch: {} # manual "Run workflow" button

concurrency:
  group: refresh-demo-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Ingest → cluster → score
        env:
          DATABASE_URL: ${{ secrets.DEMO_DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::warning::DEMO_DATABASE_URL secret is not set — add it to enable the live refresh. Skipping."
            exit 0
          fi
          if [ -n "$OPENAI_API_KEY" ]; then
            # point the AI SDK straight at OpenAI (no gateway) — real embeddings + scoring
            export LITELLM_BASE_URL="https://api.openai.com/v1"
            export AIOI_LLM_API_KEY="$OPENAI_API_KEY"
            echo "Scoring with real OpenAI models."
          else
            echo "Scoring with the Stub — add an OPENAI_API_KEY secret for real scores."
          fi
          pnpm --filter @aioi/database exec prisma migrate deploy
          pnpm exec tsx scripts/demo-data.ts
