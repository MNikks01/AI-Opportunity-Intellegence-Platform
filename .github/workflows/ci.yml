# CI — quality gates. Runs on push to main/development/hotfixes and on PRs into main/development.
# See docs/06-infra/INFRASTRUCTURE.md §5 and docs/09-process/BRANCHING_STRATEGY.md.
name: CI

on:
  push:
    branches: [main, development, hotfixes]
  pull_request:
    branches: [main, development]

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: "1"

jobs:
  quality:
    name: "Lint · Typecheck · Test · Build"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: aioi
          POSTGRES_PASSWORD: aioi
          POSTGRES_DB: aioi
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U aioi"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    env:
      DATABASE_URL: "postgresql://aioi:aioi@localhost:5432/aioi?schema=public"
      # Runtime connects as the restricted role so RLS is exercised by the suite (ADR-0003 / B-027).
      APP_DATABASE_URL: "postgresql://aioi_app:aioi_app@localhost:5432/aioi?schema=public"
      REDIS_URL: "redis://localhost:6379"
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: "9.12.0"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Apply database migrations
        run: pnpm --filter @aioi/database exec prisma migrate deploy
      - name: Grant restricted role login (dev/CI only; prod sets this via secrets)
        # Prisma 7 `db execute` reads the datasource URL from prisma.config.ts (env DATABASE_URL),
        # not a `--url` flag.
        run: |
          printf "ALTER ROLE aioi_app WITH LOGIN PASSWORD 'aioi_app';" \
            | pnpm --filter @aioi/database exec prisma db execute --stdin
      - name: Format check
        run: pnpm format:check
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build

  security:
    name: "Security · Deps · Secrets"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          version: "9.12.0"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Dependency audit (high+)
        run: pnpm audit --audit-level high || true
      - name: Secret scan (gitleaks)
        # Run on push only: gitleaks-action needs PR-write permissions on pull_request events
        # (fails otherwise, incl. dependabot's read-only token). Every push to main/development/
        # hotfixes is scanned, so secrets are still caught before they persist on a branch.
        if: github.event_name == 'push'
        uses: gitleaks/gitleaks-action@v3
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
# NOTE: an llm-eval-harness smoke gate (B-009) will be added as a job here once wired.
