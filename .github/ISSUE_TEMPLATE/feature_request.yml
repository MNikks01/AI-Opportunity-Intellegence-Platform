name: ✨ Feature request
description: Propose a new capability or improvement
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / job to be done
      description: What user problem does this solve? Which persona (see docs/00-discovery/PERSONAS.md)?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: input
    id: backlog
    attributes:
      label: Related backlog id / epic
      placeholder: "B-0xx / E-x"
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
