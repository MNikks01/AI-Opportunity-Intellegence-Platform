version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    target-branch: development
    versioning-strategy: increase
    # Group only minor+patch so auto-PRs stay green; majors are breaking and come as individual PRs
    # to be reviewed/adopted deliberately.
    groups:
      dev-dependencies:
        dependency-type: development
        update-types: ["minor", "patch"]
      production-dependencies:
        dependency-type: production
        update-types: ["minor", "patch"]
    ignore:
      # On Prisma 7 (B-025 done). Hold the next major for a deliberate migration — Prisma majors carry
      # breaking client/generator/config changes — rather than an automatic Dependabot bump.
      - dependency-name: "prisma"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@prisma/client"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@prisma/adapter-pg"
        update-types: ["version-update:semver-major"]
      # On TypeScript 6 (B-026 done). Hold the next major (TS 7 — native compiler) for a deliberate
      # migration rather than an automatic Dependabot bump.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    target-branch: development
    commit-message:
      prefix: "ci(deps)"
