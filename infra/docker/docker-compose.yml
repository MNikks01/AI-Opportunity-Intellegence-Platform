# Local development stack for the AI Opportunity Intelligence Platform.
# Brings up Postgres+pgvector, Redis, MinIO (S3), Mailhog (email), and LiteLLM (AI gateway).
# Usage: docker compose -f infra/docker/docker-compose.yml up -d
name: aioi

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: aioi
      POSTGRES_PASSWORD: aioi
      POSTGRES_DB: aioi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aioi"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # console
    volumes:
      - miniodata:/data

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # web UI

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    command: ["--port", "4000"]
    ports:
      - "4000:4000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    # config mounted in a follow-up; defaults route by model id for local dev.

volumes:
  pgdata:
  redisdata:
  miniodata:
