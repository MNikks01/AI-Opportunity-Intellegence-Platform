<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>AI Opportunity Intelligence</title>
  </head>
  <body>
    <header class="hd">
      <span class="brand">◧ AI Opportunities</span>
      <button id="settings-toggle" class="link" type="button" aria-expanded="false">Settings</button>
    </header>

    <form id="search-form" role="search">
      <input
        id="q"
        type="search"
        name="q"
        placeholder="Search opportunities…"
        autocomplete="off"
        aria-label="Search opportunities"
      />
    </form>

    <section id="settings" class="settings" hidden>
      <label class="fld">
        <span>API base URL</span>
        <input id="base" type="url" placeholder="https://…" />
      </label>
      <label class="fld">
        <span>API key (optional)</span>
        <input id="key" type="password" placeholder="aioi_…" autocomplete="off" />
      </label>
      <button id="save" class="btn" type="button">Save</button>
    </section>

    <main id="results" aria-live="polite" aria-busy="false">
      <p class="muted" id="status">Loading opportunities…</p>
    </main>

    <footer class="ft">
      <a id="open-app" href="#" target="_blank" rel="noopener noreferrer">Open the full app →</a>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
